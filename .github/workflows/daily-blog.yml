name: Daily Guizhou Blog

on:
  schedule:
    # Every Monday 07:00 Beijing time is Sunday 23:00 UTC.
    - cron: "0 23 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate weekly blog article
        run: node scripts/generate-daily-blog.mjs
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Build site
        run: npm run build
        env:
          ASTRO_TELEMETRY_DISABLED: "1"

      - name: Commit generated article
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Add daily Guizhou travel guide"
          file_pattern: src/content/blog/*.mdx
